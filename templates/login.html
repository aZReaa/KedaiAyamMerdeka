<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Kedai Ayam Merdeka</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=asset_version) }}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-card-head">
                <p class="eyebrow">Kedai Ayam Merdeka</p>
                <h2>Masuk ke panel admin</h2>
                <p class="section-copy">Gunakan akun admin untuk masuk ke panel operasional.</p>
            </div>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" class="auth-form">
                <label class="field">
                    <span>Username</span>
                    <input type="text" id="username" name="username" required placeholder="Masukkan username">
                </label>

                <label class="field">
                    <span>Password</span>
                    <input type="password" id="password" name="password" required placeholder="Masukkan password">
                </label>

                <button type="submit" class="primary-btn wide-btn">Masuk</button>
            </form>
        </section>
    </main>
</body>
</html>
